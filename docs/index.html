<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Transformers Collection</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@600;700;900&display=swap');

  :root {
    --red:        #ed1c24;       /* Autobot / Hasbro brand red */
    --red-deep:   #b00d12;
    --red-glow:   rgba(237,28,36,0.55);
    --purple:     #b829ff;       /* Decepticon neon purple */
    --purple-deep:#7a17b3;
    --purple-glow:rgba(184,41,255,0.55);
    --gold:       #ffd60a;
    --steel:      #9aa0a8;
    --dark:       #06060c;
    --dark-2:     #0c0c14;
    --card:       #11111c;
    --card-hi:    #181828;
    --border:     #22223a;
    --text:       #e8eaf2;
    --text-mute:  #6e6e8a;
    --glow:       var(--red-glow);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(184,41,255,0.10) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 50% 100%, rgba(237,28,36,0.06) 0%, transparent 60%),
      linear-gradient(rgba(184,41,255,0.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(184,41,255,0.018) 1px, transparent 1px);
    background-size: auto, auto, 48px 48px, 48px 48px;
    background-attachment: fixed, fixed, scroll, scroll;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    overflow: hidden;
    padding: 28px 40px 80px;  /* bottom space for horizon */
    background:
      radial-gradient(ellipse 70% 100% at 30% 0%, rgba(237,28,36,0.20) 0%, transparent 60%),
      radial-gradient(ellipse 70% 100% at 80% 100%, rgba(184,41,255,0.28) 0%, transparent 60%),
      linear-gradient(180deg, #08080f 0%, #0a0a14 55%, #160820 100%);
  }
  /* Synthwave perspective grid */
  header::before {
    content: '';
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(
        180deg,
        transparent 0px, transparent 28px,
        rgba(184,41,255,0.07) 28px, rgba(184,41,255,0.07) 29px
      ),
      repeating-linear-gradient(
        90deg,
        transparent 0px, transparent 64px,
        rgba(237,28,36,0.06) 64px, rgba(237,28,36,0.06) 65px
      );
    pointer-events: none;
    mask-image: linear-gradient(180deg, transparent 0%, #000 35%, #000 100%);
  }
  /* Scanlines */
  header::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(255,255,255,0.022) 0px, rgba(255,255,255,0.022) 1px,
      transparent 1px, transparent 3px
    );
    pointer-events: none; mix-blend-mode: overlay;
  }
  .header-inner {
    position: relative; display: flex; align-items: center; gap: 36px;
    max-width: 1600px; margin: 0 auto;
    z-index: 2;
  }
  .tf-symbol {
    width: clamp(110px, 14vw, 180px);
    height: clamp(110px, 14vw, 180px);
    flex-shrink: 0; object-fit: contain;
    filter:
      drop-shadow(0 0 22px var(--red-glow))
      drop-shadow(0 0 44px rgba(237,28,36,0.4))
      drop-shadow(0 0 80px rgba(237,28,36,0.18));
  }
  .header-title {
    display: flex; flex-direction: column; gap: 14px; min-width: 0; flex: 1;
  }
  /* VHS chromatic aberration on the wordmark — red ghost left, cyan ghost right */
  .tf-wordmark {
    height: clamp(96px, 16vw, 200px); max-width: 100%;
    object-fit: contain; object-position: left center;
    filter:
      drop-shadow(-3px 0 0 rgba(237,28,36,0.85))
      drop-shadow(3px 0 0 rgba(0,220,255,0.7))
      drop-shadow(0 0 22px var(--red-glow))
      drop-shadow(0 0 50px rgba(184,41,255,0.4));
    animation: vhs-jitter 6s steps(2) infinite;
  }
  @keyframes vhs-jitter {
    0%, 92%, 100% { filter:
      drop-shadow(-3px 0 0 rgba(237,28,36,0.85))
      drop-shadow(3px 0 0 rgba(0,220,255,0.7))
      drop-shadow(0 0 22px var(--red-glow))
      drop-shadow(0 0 50px rgba(184,41,255,0.4)); }
    94% { filter:
      drop-shadow(-5px 0 0 rgba(237,28,36,0.95))
      drop-shadow(5px 0 0 rgba(0,220,255,0.85))
      drop-shadow(0 0 22px var(--red-glow)); }
    96% { filter:
      drop-shadow(2px 0 0 rgba(237,28,36,0.85))
      drop-shadow(-2px 0 0 rgba(0,220,255,0.7))
      drop-shadow(0 0 22px var(--red-glow)); }
  }
  /* Chrome-gradient micro-copy */
  .chrome-row {
    display: flex; gap: 18px; align-items: center; flex-wrap: wrap;
    font-family: 'Orbitron', sans-serif; font-size: 0.78rem;
    font-weight: 800; letter-spacing: 4px; text-transform: uppercase;
  }
  /* Solid white HUD text — readable, with subtle neon glows on either side */
  .chrome-text {
    color: #ffffff;
    text-shadow:
      0 0 4px rgba(0,0,0,0.9),
      0 0 10px rgba(184,41,255,0.55),
      0 0 18px rgba(184,41,255,0.3);
  }
  .chrome-pipe {
    color: var(--red);
    text-shadow: 0 0 6px var(--red-glow), 0 0 12px rgba(237,28,36,0.5);
  }
  .chrome-purple {
    color: #ffffff;
    text-shadow:
      0 0 4px rgba(0,0,0,0.9),
      0 0 10px rgba(237,28,36,0.45),
      0 0 18px rgba(237,28,36,0.25);
  }

  /* ── SYNTHWAVE HORIZON (outrun) ── */
  .horizon {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    overflow: hidden; pointer-events: none;
    z-index: 1;
  }
  /* Glowing neon horizon line */
  .horizon::before {
    content: ''; position: absolute;
    left: 0; right: 0; top: 0; height: 2px;
    background: linear-gradient(90deg,
      transparent 0%, var(--red) 20%, #fff 50%, var(--purple) 80%, transparent 100%);
    box-shadow:
      0 0 10px var(--red),
      0 0 22px var(--red-glow),
      0 0 38px var(--purple-glow);
  }
  /* Perspective grid receding below horizon */
  .horizon-grid {
    position: absolute; left: 50%; top: 2px;
    width: 240%; height: 100%; transform: translateX(-50%);
    background-image:
      linear-gradient(180deg,
        transparent 0%,
        rgba(184,41,255,0.5) 30%,
        rgba(184,41,255,0.25) 80%,
        transparent 100%),
      repeating-linear-gradient(
        90deg, transparent 0, transparent 80px,
        rgba(237,28,36,0.5) 80px, rgba(237,28,36,0.5) 81px),
      repeating-linear-gradient(
        0deg, transparent 0, transparent 14px,
        rgba(184,41,255,0.55) 14px, rgba(184,41,255,0.55) 15px);
    background-blend-mode: multiply;
    transform-origin: 50% 0%;
    transform: translateX(-50%) perspective(140px) rotateX(58deg);
    mask-image: linear-gradient(180deg, #000 30%, transparent 100%);
  }
  .header-sub {
    color: var(--steel); font-size: 0.78rem;
    letter-spacing: 3px; text-transform: uppercase;
    font-weight: 600;
    text-shadow: 0 0 10px rgba(184,41,255,0.4);
  }
  .header-sub .dot {
    color: var(--purple); margin: 0 10px;
    text-shadow: 0 0 8px var(--purple-glow);
  }

  /* ── PIXELATED DIVIDER STRIPS ── */
  .scanstrip {
    height: 6px;
    background:
      repeating-linear-gradient(
        90deg,
        var(--red) 0px, var(--red) 8px,
        transparent 8px, transparent 12px,
        var(--purple) 12px, var(--purple) 20px,
        transparent 20px, transparent 24px
      );
    opacity: 0.55;
    box-shadow:
      0 0 8px rgba(237,28,36,0.4),
      0 0 14px rgba(184,41,255,0.3);
  }
  .scanstrip.tall { height: 8px; opacity: 0.7; }

  /* ── STATS BAR ── */
  .stats {
    display: flex; gap: 1px;
    background: var(--dark-2);
    border-bottom: 1px solid var(--border);
  }
  .stat {
    flex: 1; min-width: 90px;
    padding: 18px 12px 14px;
    text-align: center;
    position: relative;
    background: var(--dark-2);
    transition: background 0.18s;
  }
  .stat:hover { background: #15151f; }
  .stat-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.95rem; font-weight: 700;
    color: var(--red);
    text-shadow: 0 0 14px var(--red-glow), 0 0 28px rgba(237,28,36,0.4);
    line-height: 1;
  }
  /* Alternate Decepticon-purple stat numbers for wishlist/preorder/wreckers */
  .stat.purple .stat-num {
    color: var(--purple);
    text-shadow: 0 0 14px var(--purple-glow), 0 0 28px rgba(184,41,255,0.4);
  }
  .stat-lbl {
    font-size: 0.68rem; color: var(--text-mute);
    text-transform: uppercase; letter-spacing: 2.5px;
    margin-top: 8px; font-weight: 600;
  }

  /* ── CONTROLS ── */
  .controls {
    padding: 14px 24px;
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    background: rgba(13,13,20,0.92);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
    backdrop-filter: blur(10px);
  }
  .search-wrap {
    position: relative; flex: 1; min-width: 220px; max-width: 380px;
  }
  .search-wrap svg {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; stroke: #444; pointer-events: none;
  }
  #search {
    width: 100%; padding: 9px 14px 9px 36px;
    background: #12121a; border: 1px solid #2a2a3e;
    border-radius: 6px; color: #cdd6f4;
    font-family: 'Rajdhani', sans-serif; font-size: 1rem;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  #search:focus {
    border-color: var(--purple);
    box-shadow: 0 0 0 3px rgba(184,41,255,0.18), 0 0 18px rgba(184,41,255,0.3);
  }
  #search::placeholder { color: #3a3a5a; }

  .filter-btn {
    padding: 8px 16px; border-radius: 6px;
    border: 1px solid #2a2a3e; background: #12121a;
    color: #888; cursor: pointer;
    font-family: 'Rajdhani', sans-serif; font-size: 0.88rem; font-weight: 600;
    letter-spacing: 0.8px; text-transform: uppercase;
    transition: all 0.18s;
  }
  .filter-btn:hover {
    border-color: var(--purple); color: var(--text);
    box-shadow: 0 0 12px rgba(184,41,255,0.2);
  }
  .filter-btn.active {
    background: var(--red); border-color: var(--red); color: #fff;
    box-shadow: 0 0 14px var(--red-glow), 0 0 28px rgba(237,28,36,0.3);
  }
  .filter-btn.flag-filter { border-color: #ff9f43; color: #ff9f43; }
  .filter-btn.flag-filter.active { background: #ff9f43; border-color: #ff9f43; color: #0a0a0f; box-shadow: 0 0 12px rgba(255,159,67,0.4); }
  #result-count {
    margin-left: auto; color: #444;
    font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase;
  }

  /* ── FLAG BUTTON ── */
  .flag-btn {
    position: absolute; top: 8px; left: 8px;
    width: 28px; height: 28px;
    background: rgba(0,0,0,0.6); border: 1px solid #2a2a3e;
    border-radius: 4px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; line-height: 1;
    transition: all 0.15s; backdrop-filter: blur(4px);
    z-index: 2; opacity: 0;
  }
  .card:hover .flag-btn { opacity: 1; }
  .flag-btn:hover { border-color: #ff9f43; background: rgba(255,159,67,0.2); }
  .flag-btn.flagged {
    opacity: 1; border-color: #ff9f43;
    background: rgba(255,159,67,0.25);
  }
  .card.is-flagged {
    border-color: rgba(255,159,67,0.5);
    box-shadow: 0 0 0 1px rgba(255,159,67,0.2);
  }

  /* ── COPY / CLEAR FLAGGED ── */
  #copy-flagged, #clear-flagged {
    padding: 8px 14px; border-radius: 6px;
    border: 1px solid #2a2a3e; background: #12121a;
    color: #444; cursor: pointer;
    font-family: 'Rajdhani', sans-serif; font-size: 0.85rem; font-weight: 600;
    letter-spacing: 0.5px; text-transform: uppercase;
    transition: all 0.2s; display: none;
  }
  #copy-flagged.visible { display: block; color: #ff9f43; border-color: #ff9f43; }
  #copy-flagged:hover { background: rgba(255,159,67,0.1); }
  #clear-flagged.visible { display: block; color: #777; border-color: #444; }
  #clear-flagged:hover { background: rgba(230,57,70,0.15); color: var(--red); border-color: var(--red); }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 14px; padding: 20px 24px 32px;
  }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
    transition: transform 0.2s cubic-bezier(.17,.67,.47,1.2),
                border-color 0.18s, box-shadow 0.18s;
    position: relative; display: flex; flex-direction: column;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: rgba(184,41,255,0.55);
    box-shadow:
      0 12px 32px rgba(0,0,0,0.6),
      0 0 24px rgba(184,41,255,0.35),
      0 0 50px rgba(237,28,36,0.12);
  }

  /* image area */
  .card-img-wrap {
    position: relative; width: 100%; height: 196px;
    background: linear-gradient(180deg, #06060c 0%, #0a0a12 100%);
    overflow: hidden; flex-shrink: 0;
  }
  .card-img {
    width: 100%; height: 100%;
    object-fit: contain;
    transition: transform 0.3s ease;
    padding: 10px;
  }
  .card:hover .card-img { transform: scale(1.05); }
  .card-img-wrap::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 40px;
    background: linear-gradient(transparent, var(--card));
    pointer-events: none;
  }

  /* rank pill */
  .rank-badge {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,0.78);
    border: 1px solid rgba(237,28,36,0.55);
    color: var(--gold); font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem; font-weight: 700;
    padding: 3px 7px; border-radius: 3px;
    backdrop-filter: blur(4px); letter-spacing: 0.5px;
    z-index: 2;
  }

  /* card body */
  .card-body { padding: 12px 13px 13px; flex: 1; display: flex; flex-direction: column; }
  .card-name {
    font-size: 1rem; font-weight: 700; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    letter-spacing: 0.2px; margin-bottom: 2px; line-height: 1.2;
  }
  .card-line {
    font-size: 0.7rem; color: var(--text-mute); margin-bottom: 10px;
    letter-spacing: 0.6px; text-transform: uppercase; font-weight: 600;
  }

  /* status + tag badges */
  .badges { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .badge {
    font-size: 0.6rem; padding: 3px 8px; border-radius: 3px;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
    white-space: nowrap; line-height: 1.4;
  }
  .badge-status { color: #fff; }
  /* Wrecker badge replaced by the Wreckers logo image */
  .badge-wrecker {
    display: inline-flex; align-items: center;
    height: 18px; padding: 0; border: none; background: transparent;
  }
  .badge-wrecker img {
    height: 22px; width: auto; display: block;
    filter: drop-shadow(0 0 6px rgba(237,28,36,0.45));
  }
  .badge-combiner {
    background: transparent; color: var(--gold);
    border: 1px solid rgba(255,214,10,0.4);
  }

  /* retailer / notes */
  .card-footer {
    margin-top: auto; padding-top: 8px; border-top: 1px solid #1a1a2a;
    margin-top: 9px;
  }
  .card-retailer { font-size: 0.72rem; color: #484868; }
  .card-retailer span { color: #585878; }
  .card-notes { font-size: 0.7rem; color: #363650; margin-top: 3px; font-style: italic; line-height: 1.3; }

  /* ── EMPTY STATE ── */
  .no-results {
    text-align: center; color: #2a2a4a; padding: 100px 32px;
    font-family: 'Orbitron', sans-serif; font-size: 0.95rem; letter-spacing: 2px;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--dark); }
  ::-webkit-scrollbar-thumb { background: var(--red); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <img class="tf-symbol" src="assets/autobot_symbol.png" alt="Autobots">
    <div class="header-title">
      <div class="chrome-row">
        <span class="chrome-text">EST · 1984</span>
        <span class="chrome-pipe">//</span>
        <span class="chrome-purple">TF · ARCHIVE · SYS</span>
        <span class="chrome-pipe">//</span>
        <span class="chrome-text">REC · 2026-05-25</span>
      </div>
      <img class="tf-wordmark" src="assets/transformers_logo.png" alt="Transformers">
      <div class="header-sub">Collection<span class="dot">·</span>239/239 figures<span class="dot">·</span>More than meets the eye</div>
    </div>
  </div>
  <div class="horizon">
    <div class="horizon-grid"></div>
  </div>
</header>

<div class="scanstrip tall"></div>

<div class="stats">
  <div class="stat"><div class="stat-num">239</div><div class="stat-lbl">Total</div></div>
  <div class="stat"><div class="stat-num">203</div><div class="stat-lbl">Owned</div></div>
  <div class="stat purple"><div class="stat-num">29</div><div class="stat-lbl">Wishlist</div></div>
  <div class="stat purple"><div class="stat-num">7</div><div class="stat-lbl">Pre-ordered</div></div>
  <div class="stat"><div class="stat-num">0</div><div class="stat-lbl">Ordered</div></div>
  <div class="stat"><div class="stat-num">24</div><div class="stat-lbl">Wreckers</div></div>
</div>

<div class="scanstrip"></div>

<div class="controls">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="search" placeholder="Search name, line, combiner..." oninput="render()">
  </div>
  <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('owned',this)">Owned</button>
  <button class="filter-btn" onclick="setFilter('want',this)">Wishlist</button>
  <button class="filter-btn" onclick="setFilter('preordered',this)">Pre-ordered</button>
  <button class="filter-btn" onclick="setFilter('ordered',this)">Ordered</button>
  <button class="filter-btn" onclick="setFilter('wrecker',this)">Wreckers</button>
  <button class="filter-btn flag-filter" onclick="setFilter('flagged',this)">&#128681; Flagged <span id="flag-count"></span></button>
  <button id="copy-flagged" onclick="copyFlagged()">Copy List</button>
  <button id="clear-flagged" onclick="clearFlagged()" title="Remove all flags">Clear Flags</button>
  <span id="result-count"></span>
</div>

<div class="grid" id="grid"></div>
<div class="no-results" id="no-results" style="display:none">NO FIGURES FOUND</div>

<script>
const STATUS_COLOR = {"owned": "#00d4aa", "want": "#4d9fff", "preordered": "#ff9f43", "ordered": "#c56cfc"};
const STATUS_LABEL = {"owned": "Owned", "want": "Wishlist", "preordered": "Pre-ordered", "ordered": "Ordered"};
let figures = [];
let activeFilter = 'all';
const STORAGE_KEY = 'tfcollection_flagged';

function getFlagged() {
  try { return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')); }
  catch { return new Set(); }
}
function saveFlagged(set) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...set]));
}
function toggleFlag(id) {
  const flagged = getFlagged();
  flagged.has(id) ? flagged.delete(id) : flagged.add(id);
  saveFlagged(flagged);
  render();
}

function updateFlagUI() {
  const count = getFlagged().size;
  document.getElementById('flag-count').textContent = count ? `(${count})` : '';
  document.getElementById('copy-flagged').classList.toggle('visible', count > 0);
  document.getElementById('clear-flagged').classList.toggle('visible', count > 0);
}

function copyFlagged() {
  const flagged = getFlagged();
  const names = figures
    .filter(f => flagged.has(f.id))
    .map(f => `${f.name} (${f.line})`)
    .join('\n');
  navigator.clipboard.writeText(names).then(() => {
    const btn = document.getElementById('copy-flagged');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy List', 1500);
  });
}

function clearFlagged() {
  const count = getFlagged().size;
  if (count === 0) return;
  if (!confirm(`Remove all ${count} flag${count === 1 ? '' : 's'}? This can't be undone.`)) return;
  saveFlagged(new Set());
  // If we're currently filtering on flagged, drop back to All
  if (activeFilter === 'flagged') {
    activeFilter = 'all';
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.filter-btn').classList.add('active');
  }
  render();
}

// TFWiki page-name overrides for characters whose canonical page is NOT
// "<Name>_(G1)". Injected from tools/tfwiki_links.py — single source of truth.
// To add a new override: edit tools/tfwiki_links.py and rebuild.
const TFWIKI_OVERRIDES = {"Agent Knight": "Agent_Knight", "Alchemist Prime": "Maccadam", "Amalgamous Prime": "Amalgamous_Prime", "Battleslash": "Battleslash", "Bone Shaker": "Bone_Shaker", "Daddy-O": "Trip-Up", "Dracodon": "Dracodon", "Ectotron": "Ectotron", "Gigawatt": "Gigawatt", "Horri-Bull": "Horri-Bull", "Hun-Grrr": "Hun-Gurrr_(G1)", "Ironhide BD": "Ironhide_(G1)", "Jalopy": "Jalopy", "Jhiaxus": "Jhiaxus_(G2)", "Leadfoot G2": "Leadfoot_(G2)", "Liege Maximo": "Liege_Maximo", "Mandalorian": "The_Mandalorian", "Matrix of Leadership": "Matrix_of_Leadership", "Megatronus Prime": "Megatronus_Prime", "Micronus Prime": "Micronus_Prime", "Minerva": "Minerva_(G1_robot)", "Nexus Prime": "Nexus_Prime", "Onyx Prime": "Onyx_Prime", "Pointblank": "Pointblank", "Prima Prime": "Prima", "Quintesson": "Quintesson_Judge_(G1)", "Quintus Prime": "Quintus_Prime", "Rattrap": "Rattrap", "Red Heat": "Red_Heat", "Road Rocket": "Road_Rocket_(G2)", "Roadtrap": "Roadtrap", "Six Shot": "Six_Shot", "Skullgrin": "Skullgrin", "Solus Prime": "Solus_Prime", "Spike": "Spike", "Star Optimus": "Optimus_Prime_(G1)", "Strongarm": "Strongarm_(RID)", "Sweeps": "Sweeps", "Trip-Up": "Trip-Up", "Vector Prime": "Vector_Prime_(Cybertron)", "Wheeljack Origins": "Wheeljack_(G1)", "Wild Ride": "Wildrider_(G1)", "Wreck Gar": "Wreck-Gar_(G1)"};

function tfwikiUrl(name) {
  // Strip *<continuity> suffix the user uses for movie/animated variants
  const clean = name.replace(/\s*\*.*$/, '').trim();
  if (TFWIKI_OVERRIDES[clean]) {
    return 'https://tfwiki.net/wiki/' + TFWIKI_OVERRIDES[clean];
  }
  // Title-case each word AND each hyphen segment so "Daddy-O" stays "Daddy-O"
  // and "BumbleBee" -> "Bumblebee" (TFWiki is case-sensitive after first letter)
  const tc = w => w.split('-').map(p =>
    p.charAt(0).toUpperCase() + p.slice(1).toLowerCase()
  ).join('-');
  const titled = clean.split(/\s+/).map(tc).join(' ');
  return 'https://tfwiki.net/wiki/' + encodeURIComponent(titled.replace(/ /g, '_')) + '_(G1)';
}

async function init() {
  const res = await fetch('data.json');
  figures = await res.json();
  render();
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const flagged = getFlagged();
  let figs = figures;

  if (activeFilter === 'wrecker') {
    figs = figs.filter(f => f.is_wrecker);
  } else if (activeFilter === 'flagged') {
    figs = figs.filter(f => flagged.has(f.id));
  } else if (activeFilter !== 'all') {
    figs = figs.filter(f => f.status === activeFilter);
  }

  if (q) {
    figs = figs.filter(f =>
      f.name.toLowerCase().includes(q) ||
      f.line.toLowerCase().includes(q) ||
      f.combiner.toLowerCase().includes(q) ||
      f.notes.toLowerCase().includes(q) ||
      f.retailer.toLowerCase().includes(q)
    );
  }

  const grid = document.getElementById('grid');
  const noResults = document.getElementById('no-results');
  document.getElementById('result-count').textContent =
    figs.length + ' figure' + (figs.length !== 1 ? 's' : '');

  updateFlagUI();

  if (!figs.length) {
    grid.innerHTML = '';
    noResults.style.display = '';
    return;
  }
  noResults.style.display = 'none';

  grid.innerHTML = figs.map(f => {
    const color   = STATUS_COLOR[f.status] || '#888';
    const label   = STATUS_LABEL[f.status] || f.status;
    const wikiUrl = tfwikiUrl(f.name);
    const isFlagged = flagged.has(f.id);
    const rankBadge = f.rank != null
      ? `<div class="rank-badge">${f.rank}&thinsp;/&thinsp;10</div>` : '';
    const wrecker  = f.is_wrecker
      ? `<span class="badge badge-wrecker" title="Wrecker"><img src="assets/wreckers_logo.png" alt="Wrecker"></span>` : '';
    const combiner = f.combiner   ? `<span class="badge badge-combiner">${f.combiner}</span>` : '';
    const hasFooter = f.retailer || f.notes;
    const footer = hasFooter ? `
    <div class="card-footer">
      ${f.retailer ? `<div class="card-retailer">From <span>${f.retailer}</span></div>` : ''}
      ${f.notes    ? `<div class="card-notes">${f.notes}</div>` : ''}
    </div>` : '';

    return `
<div class="card${isFlagged ? ' is-flagged' : ''}" id="card-${f.id}">
  <a href="${wikiUrl}" target="_blank" rel="noopener" tabindex="-1">
    <div class="card-img-wrap">
      <button class="flag-btn${isFlagged ? ' flagged' : ''}"
              onclick="event.preventDefault();event.stopPropagation();toggleFlag(${f.id})"
              title="${isFlagged ? 'Remove flag' : 'Flag this image for review'}">
        &#128681;
      </button>
      ${rankBadge}
      <img class="card-img" src="${f.image}" alt="${f.name}"
           loading="lazy" onerror="this.src='images/placeholder.png'">
    </div>
  </a>
  <div class="card-body">
    <div class="card-name" title="${f.name}">${f.name}</div>
    <div class="card-line">${f.line || ''}</div>
    <div class="badges">
      <span class="badge badge-status" style="background:${color}">${label}</span>
      ${wrecker}${combiner}
    </div>
    ${footer}
  </div>
</div>`;
  }).join('');
}

init();
</script>
</body>
</html>
